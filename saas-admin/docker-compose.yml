version: '3.8'

# 🍌 Banana AI Trading — SaaS Admin Cloud Stack
# Deploy this on your VPS (Hetzner / DigitalOcean / AWS)
# Users' desktop apps connect to this centrally.

services:
  admin-backend:
    build: ./backend
    container_name: banana-admin-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - BANANA_JWT_SECRET=${BANANA_JWT_SECRET:-please-change-this-256-bit-secret}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-banana-admin-2026}
      - DATABASE_URL=postgresql://banana:${DB_PASSWORD:-banana}@db:5432/banana_saas
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - banana-net

  admin-frontend:
    build: ./frontend
    container_name: banana-admin-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - admin-backend
    networks:
      - banana-net

  db:
    image: postgres:16-alpine
    container_name: banana-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=banana
      - POSTGRES_PASSWORD=${DB_PASSWORD:-banana}
      - POSTGRES_DB=banana_saas
    volumes:
      - banana-db-data:/var/lib/postgresql/data
    networks:
      - banana-net

  redis:
    image: redis:7-alpine
    container_name: banana-redis
    restart: unless-stopped
    volumes:
      - banana-redis-data:/data
    networks:
      - banana-net

  nginx:
    image: nginx:alpine
    container_name: banana-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - admin-backend
      - admin-frontend
    networks:
      - banana-net

volumes:
  banana-db-data:
  banana-redis-data:

networks:
  banana-net:
    driver: bridge
