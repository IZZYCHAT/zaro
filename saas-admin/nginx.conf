events { worker_connections 1024; }

http {
    upstream backend {
        server admin-backend:9000;
    }
    upstream frontend {
        server admin-frontend:80;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.banana-ai.trade admin.banana-ai.trade;
        return 301 https://$host$request_uri;
    }

    # API server (used by desktop clients + admin dashboard)
    server {
        listen 443 ssl http2;
        server_name api.banana-ai.trade;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 10M;

        # REST endpoints
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (device telemetry + admin live feed)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / { return 404; }
    }

    # Admin dashboard SPA
    server {
        listen 443 ssl http2;
        server_name admin.banana-ai.trade;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
